name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# When a new revision is pushed to a PR, cancel all in-progress CI runs for that
# PR. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          # - macos-latest
          - windows-latest
        java-version: [25]

    steps:
    - uses: actions/checkout@v6

    - name: Checkout Chicory
      uses: actions/checkout@v6
      with:
        repository: dylibso/chicory
        ref: main
        path: chicory

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '${{ matrix.java-version }}'
        cache: maven

    - name: Install Chicory modules
      working-directory: chicory
      run: mvn -B -Dquickly

    - name: Test chicory-redline
      run: mvn -B install -P panama,panama-tests,jffi,ci

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure() # always run even if the previous step fails
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'

  # Verify runner-jffi on Java 11: compile on Java 25 (needed for test-gen plugin),
  # then run tests on Java 11 to ensure the jffi backend works on older LTS.
  test-jffi-on-java11:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          # - macos-latest
          - windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Checkout Chicory
      uses: actions/checkout@v6
      with:
        repository: dylibso/chicory
        ref: main
        path: chicory

    - name: Set up Java 25
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: maven

    - name: Install Chicory modules
      working-directory: chicory
      run: mvn -B -Dquickly

    - name: Compile (Java 25)
      run: mvn -B install -P jffi,ci -DskipTests

    - name: Set up Java 11
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: maven

    - name: Run tests (Java 11)
      run: mvn -B surefire:test -P jffi,ci

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure()
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'
